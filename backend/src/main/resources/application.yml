server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: compare-insurance
  datasource:
    url: jdbc:h2:mem:comparedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.compare: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - traceId=%X{traceId} - %msg%n"

# Feature flags
feature:
  experimental-ranking: false

# Ranking weights
ranking:
  price-weight: 0.5
  rating-weight: 0.3
  feature-weight: 0.2
